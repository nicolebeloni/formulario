<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>

    <link rel="stylesheet" href="style.css">

</head>

<header> 
    <h1> adote seu novo melhor amigo!</h1>
</header>

<body>

<h2>Cadastro</h2>
<form>
    <div>
<label for="nome">informe o nome completo</label>
<input type="text" id= nome required />
</div>

 <div>
<label for="email">informe o email</label>
<input type="text" id= email required />
</div>

 <div>
<label for="telefone">informe o telefone</label>
<input type="number" id= telefone required />
</div>

 <div>
<label for="cpf">informe o cpf</label>
<input type="number" id= cpf required />
</div>

 <div>
<label for="idade">informe a sua idade</label>
<input type="number" id= idade required />
</div>

 <div>
<label for="nome">informe sua cidade</label>
<input type="text" id= cidade required />
</div>

 <div>
<label for="moradia">qual seu tipo de moradia?</label>
<input type="radio" name="moradia" value="apartamento" required /> apartamento
<input type="radio" name="moradia" value="casa"/> casa
</div>

 <div>
<label for="quintal">possui quintal?</label>
<input type="radio" name="quintal" value="nao" required /> nao
<input type="radio" name="quintal" value="sim"/> sim
</div>

 <div>
<label for="pet">já teve pet antes?</label>
<input type="radio" name="pet" value="nao" required /> nao
<input type="radio" name="pet" value="sim"/> sim
</div>

 <div>
<label for="nome">quantas horas o animal ficará sozinho?</label>
<input type="number" id= horas required />
</div>

 <div>
<label for="nome">qual o motivo da adoção?</label>
<input type="text" id= motivo required />
</div>

 <div>
<label for="nome"> <u>aceitar termo de responsabilidade</u></label>
<input type="checkbox" id= termo required />
</div>


</form>




</body>
</html>
